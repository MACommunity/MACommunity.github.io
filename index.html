<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Midwest Anime Community</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">
    <img src="images/X_pfp.jpg" alt="avatar" class="avatar">
    <h1>Midwest Anime Community</h1>
    <p class="bio">Your Local Anime Community</p>

    <!-- links -->
    <div class="links">
      <a href="https://discord.gg/Gab8xTz928/" target="_blank">Discord</a>
      <a href="https://www.tiktok.com/@midwestanimecommunity/" target="_blank">TikTok</a>
      <a href="https://www.instagram.com/midwestanimecommunity/" target="_blank">Instagram</a>
      <a href="https://x.com/MidwestAnime/" target="_blank">Twitter</a>
      <a href="https://x.com/MidwestAnime/" target="_blank">Support Us!</a>
    </div>
  </div>

  <!-- qrcode -->
  <img src="images/QRcode.png" alt="QRcode" id="QR_code">
  <script>
    const qrCodePopout = document.getElementById('QR_code');

    qrCodePopout.addEventListener('click', function() {
      qrCodePopout.classList.toggle('active');
    });
  </script>
    
  <img src="images/MACscot-Front.png" alt="charFront" id="charFront">

  <img src="images/MACscot-Back.png" alt="charBack" id="charBack">

</html>
